<!DOCTYPE html>
<html lang="zh-Hans-CN">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game</title>

  <!-- MDL 1.3.0 -->
  <link rel="stylesheet" href="./material.min.css">
  <script src="./material.min.js"></script>
  <link rel="stylesheet" href="https://fonts.font.im/icon?family=Material+Icons">

  <!-- 自定义style -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="mdl-layout mdl-js-layout mdl-layout--fixed-header">

    <!-- 页头 -->
    <header class="mdl-layout__header">
      <div class="mdl-layout__header-row">
        <!-- 标题 -->
        <span class="mdl-layout-title">Game</span>
      </div>
    </header>

    <!-- 主导航 -->
    <div class="mdl-layout__drawer">
      <span class="mdl-layout-title">菜单</span>
      <nav class="mdl-navigation">
        <a class="mdl-navigation__link" href="">读取进度</a>
        <a class="mdl-navigation__link" href="">重置进度</a>
      </nav>
    </div>

    <!-- 正文容器 -->
    <main id="main" class="mdl-layout__content" style="margin: 0 1rem">

      <!-- 正文 -->
      <p></p>
      <div data-id="1" data-key="1" data-hint="0">
        <p>我好像睡得太沉了，睡得【眼】都睁不开了。</p>
        <p>这点感想无关紧要。【关键】在于，我到站了没？</p>
        <p>我赶紧睁开<span data-type="key" data-div="1" data-id="1">＿</span><span hidden data-type="key-answer" data-div="1" data-id="1" data-nextdiv="2">眼</span>。</p>
      </div>
      <hr hidden data-id="1">
      <div hidden data-id="2" data-key="1" data-hint="0">
        <p>映入眼中的，是摇摇晃晃的地铁车厢。看来地铁还在行驶中。</p>
        <p>不过，为什么车厢里空无一人？</p>
        <p>我有点搞不清楚现状。先试着从【<span data-type="hint" data-div="2" data-id="1" data-parent="0" data-hit="0">记忆</span>】中找找【灵感】吧。</p>
        <span hidden data-type="hint-content" data-div="2" data-hint="1">
          <p>嗯，我是在下班回家的路上，计划在地铁的终点站下车。</p>
          <p></p>
        </span>
      </div>
    </main>

    <!-- 页脚功能区 -->
    <footer class="mdl-mini-footer">
      <div class="mdl-mini-footer__left-section">
        <ul class="mdl-mini-footer__link-list">
          <li><a id="show-key-dialog">&emsp;关键&emsp;</a></li>
          <li><a id="show-hint-dialog">&emsp;灵感&emsp;</a></li>
        </ul>
      </div>
    </footer>
  </div>

  <!-- 关键对话框 -->
  <dialog id="key-dialog" class="mdl-dialog">
    <div class="mdl-dialog__content">
      <form action="#">
        <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
          <input class="mdl-textfield__input" type="text" id="input-key">
          <label class="mdl-textfield__label" for="input-key">推动故事的关键是？</label>
        </div>
      </form>
    </div>
    <div class="mdl-dialog__actions">
      <button id="key-confirm" type="button" class="mdl-button confirm">确定</button>
      <button type="button" class="mdl-button cancel">取消</button>
    </div>
  </dialog>

  <!-- 灵感对话框 -->
  <dialog id="hint-dialog" class="mdl-dialog">
    <div class="mdl-dialog__content">
      <form action="#">
        <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
          <input class="mdl-textfield__input" type="text" id="input-hint">
          <label class="mdl-textfield__label" for="input-hint">要从哪里获取灵感？</label>
        </div>
      </form>
    </div>
    <div class="mdl-dialog__actions">
      <button id="hint-confirm" type="button" class="mdl-button confirm">确定</button>
      <button type="button" class="mdl-button cancel">取消</button>
    </div>
  </dialog>

  <!-- 提示框 -->
  <div id="notification" class="mdl-js-snackbar mdl-snackbar">
    <div class="mdl-snackbar__text"></div>
    <button class="mdl-snackbar__action" type="button"></button>
  </div>
  <script>
    function showNotification(type) {
      var message;
      switch (type) {
        case 'key-hit':
          message = '关键词命中！有了新的进展。';
          break;
        case 'key-miss':
          message = '关键词未命中。';
          break;
        case 'hint-miss':
          message = '未得到任何灵感。';
          break;
        case 'hint-repeat':
          message = '对此得不到更多的灵感了。';
          break;
        case 'hint-hit':
          message = '得到了灵感，理解了更多细节。';
          break;
      }
      var notification = document.querySelector('.mdl-js-snackbar');
      notification.MaterialSnackbar.showSnackbar(
      {
        message: message
      });
    }
  </script>

  <!-- 关键按钮功能 -->
  <script>
    var keyDialog = document.querySelector('#key-dialog');
    var showKeyDialogButton = document.querySelector('#show-key-dialog');
    if (!keyDialog.showModal) {
      dialogPolyfill.registerDialog(keyDialog);
    }
    showKeyDialogButton.addEventListener('click', function() {
      keyDialog.querySelector('#input-key').value = "";
      keyDialog.showModal();
    });
    keyDialog.querySelector('.cancel').addEventListener('click', function() {
      keyDialog.close();
    });
    keyDialog.querySelector('.confirm').addEventListener('click', function() {
      var result = matchKey(keyDialog.querySelector('#input-key').value);
      if (result != 0) {
        showNotification('key-hit');
        document.querySelector('main hr[data-id="' + localStorage.p + '"]').hidden = false;
        document.querySelector('main div[data-id="' + localStorage.p + '"] span[data-type="key"]').hidden = true;
        document.querySelector('main div[data-id="' + localStorage.p + '"] span[data-type="key-answer"]').hidden = false;
        document.querySelector('main div[data-id="' + result + '"]').hidden = false;
        if (result.indexOf('end') == -1)
          localStorage.p = result;
      }
      else showNotification('key-miss');
      keyDialog.close();
    });
  </script>

  <!-- 灵感按钮功能 -->
  <script>
    var hintDialog = document.querySelector('#hint-dialog');
    var showHintDialogButton = document.querySelector('#show-hint-dialog');
    if (!hintDialog.showModal) {
      dialogPolyfill.registerDialog(hintDialog);
    }
    showHintDialogButton.addEventListener('click', function() {
      hintDialog.querySelector('#input-hint').value = "";
      hintDialog.showModal();
    });
    hintDialog.querySelector('.cancel').addEventListener('click', function() {
      hintDialog.close();
    });
    hintDialog.querySelector('.confirm').addEventListener('click', function() {
      var result = matchHint(hintDialog.querySelector('#input-hint').value);
      if (result == -1)
        showNotification('hint-repeat');
      else if (result == 0)
        showNotification('hint-miss');
      else {
        showNotification('hint-hit');
        var hitHint = document.querySelector('main div[data-id="' + localStorage.p + '"] span[data-type="hint"][data-id="' + result + '"]');
        hitHint.dataset.hit = '1';
        document.querySelector('main div[data-id="' + localStorage.p + '"] span[data-type="hint-content"][data-hint="' + result + '"]').hidden = false;
      }
      hintDialog.close();
    });
  </script>

  <!-- 关键匹配 -->
  <script>
    function matchKey(inputKey) {
      var currentDiv = document.querySelector('main div[data-id="' + localStorage.p + '"]');
      var keyAnswer = currentDiv.querySelector('main span[data-type="key-answer"]');
      if (inputKey == keyAnswer.innerHTML) {
        var nextDiv = keyAnswer.dataset.nextdiv;
        return nextDiv;
      }
      else return 0;
    }
  </script>

  <!-- 灵感匹配 -->
  <script>
    function matchHint(inputHint) {
      var currentDiv = document.querySelector('main div[data-id="' + localStorage.p + '"]');
      var hintList = currentDiv.querySelectorAll('main span[data-type="hint"]');
      for (i = 0; i < hintList.length; i++) {
        if (hintList[i].innerHTML == inputHint) {
          if (hintList[i].dataset.hit == 1)
            return -1;
          else if (hintList[i].dataset.parent != 0 && currentDiv.querySelector('span[data-id="' + hintList[i].dataset.parent + '"]').dataset.hit == 0)
            return 0;
          else return hintList[i].dataset.id;
        }
      };
      return 0;
    }
  </script>

  <!-- 存档检测 -->
  <script>
    if (typeof(Storage) != 'undefined') {
      var p = localStorage.p;
      if (!p)
        localStorage.p = '1';
      else {
        for (i = 1; i < p; i++) {
          var div = document.querySelector('main div[data-id="' + i + '"]');
          div.hidden = false;
          div.querySelector('span[data-type="key"]').hidden = true;
          div.querySelector('span[data-type="key-answer"]').hidden = false;
          div.querySelectorAll('span[data-type="hint"]').forEach((item) => { item.dataset.hit = 1; });
          div.querySelectorAll('span[data-type="hint-content"]').forEach(item => { item.hidden = false; });
          document.querySelector('main hr[data-id="' + i + '"]').hidden = false;
          document.querySelector('main div[data-id="' + (i + 1) + '"]').hidden = false;
        }
      }
    }
    else alert("浏览器不支持本地储存。游戏可能无法正常使用存档功能。");
  </script>
  <!-- Project -->
  <script src="main.js"></script>
</body>

</html>
